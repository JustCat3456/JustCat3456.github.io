<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- モニター本体 -->
  <rect x="2" y="2" width="28" height="20" rx="1" fill="#2E8B57" stroke="#1C1A17" stroke-width="2"/>
  <!-- スクリーン（内側） -->
  <rect x="4" y="4" width="24" height="16" fill="#1C1A17"/>
  <!-- ターミナル プロンプト ">" -->
  <rect x="6" y="8"  width="3" height="2" fill="#4ADE80"/>
  <rect x="6" y="10" width="2" height="2" fill="#4ADE80"/>
  <rect x="6" y="12" width="3" height="2" fill="#4ADE80"/>
  <!-- カーソルブロック -->
  <rect x="11" y="9" width="3" height="4" fill="#4ADE80"/>
  <!-- 点滅風 装飾ライン -->
  <rect x="16" y="11" width="8" height="2" fill="#2E8B57" opacity="0.6"/>
  <!-- スタンド -->
  <rect x="13" y="22" width="6" height="3" fill="#2D2A26" stroke="#1C1A17" stroke-width="1"/>
  <!-- 台座 -->
  <rect x="9" y="25" width="14" height="3" rx="1" fill="#2D2A26" stroke="#1C1A17" stroke-width="1"/>
</svg>